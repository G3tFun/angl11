<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>✨ DuoQuiz · Еда и продукты</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, sans-serif;
      background: #f1f7eb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 8px;
      -webkit-tap-highlight-color: transparent;
    }

    /* главная карточка — как экран телефона */
    .phone-frame {
      max-width: 420px;
      width: 100%;
      background: white;
      border-radius: 32px;
      box-shadow: 0 20px 40px rgba(0, 30, 0, 0.08), 0 6px 12px rgba(0, 0, 0, 0.05);
      overflow: hidden;
      padding: 20px 18px 28px;
      border: 1px solid #d9e8cf;
      transition: all 0.2s;
    }

    /* шапка в стиле Duolingo */
    .duo-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .duo-icon {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .duo-icon span {
      font-size: 32px;
      line-height: 1;
    }

    .duo-icon h2 {
      font-size: 24px;
      font-weight: 700;
      color: #2b7334;
      letter-spacing: -0.5px;
    }

    .heart-score {
      background: #fff1e0;
      padding: 8px 14px;
      border-radius: 40px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 600;
      color: #b55f1a;
      border: 1px solid #ffe6c6;
    }

    .heart-score span {
      font-size: 20px;
      margin-right: 4px;
    }

    /* прогресс-бар */
    .progress-section {
      margin-bottom: 22px;
    }

    .progress-info {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      font-weight: 500;
      color: #3c4f2d;
      margin-bottom: 6px;
    }

    .progress-bar-bg {
      height: 12px;
      background: #e2eed9;
      border-radius: 30px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: #58cc02;
      border-radius: 30px;
      transition: width 0.3s ease;
      box-shadow: inset 0 1px 2px rgba(255,255,255,0.5);
    }

    /* карточка вопроса */
    .question-card {
      background: #ffffff;
      border-radius: 28px;
      padding: 28px 16px 24px;
      margin-bottom: 18px;
      box-shadow: 0 8px 0 #b7d7a8, 0 4px 12px rgba(0,0,0,0.02);
      border: 1px solid #d4ebc5;
    }

    .english-phrase {
      font-size: 32px;
      font-weight: 700;
      text-align: center;
      color: #1f3b12;
      margin-bottom: 28px;
      word-break: break-word;
      line-height: 1.3;
      text-shadow: 1px 1px 0 rgba(255,255,255,0.8);
    }

    /* зона ввода (input) */
    .input-area {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .translation-input {
      width: 100%;
      padding: 18px 18px;
      font-size: 18px;
      border: 2px solid #d0e0c0;
      border-radius: 24px;
      background: #fafdf8;
      outline: none;
      font-family: inherit;
      transition: border 0.15s, box-shadow 0.15s;
      color: #1e3a1e;
      font-weight: 500;
    }

    .translation-input:focus {
      border-color: #58cc02;
      box-shadow: 0 0 0 4px rgba(88, 204, 2, 0.15);
    }

    .translation-input:disabled {
      background: #f0f4ea;
      color: #3a5730;
      opacity: 0.8;
    }

    /* сетка для вариантов (выбор) */
    .options-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .option-btn {
      background: white;
      border: 2.5px solid #d9e8cf;
      border-radius: 20px;
      padding: 18px 16px;
      font-size: 18px;
      font-weight: 500;
      color: #1f3b12;
      text-align: left;
      width: 100%;
      cursor: pointer;
      transition: all 0.1s ease;
      box-shadow: 0 4px 0 #b0c8a0;
      font-family: inherit;
      letter-spacing: 0.2px;
      word-break: break-word;
    }

    .option-btn:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #9bb389;
    }

    .option-btn.correct-guess {
      background: #a5e07d;
      border-color: #58cc02;
      box-shadow: 0 4px 0 #3f9e00;
      color: #1a3b0e;
    }

    .option-btn.wrong-guess {
      background: #ffdfd5;
      border-color: #f4a28c;
      box-shadow: 0 4px 0 #c97a62;
      color: #6b1e00;
      opacity: 0.9;
    }

    .option-btn:disabled {
      opacity: 0.8;
      transform: none;
      box-shadow: 0 3px 0 #aabfa0;
      cursor: default;
      pointer-events: none;
    }

    /* кнопка проверки */
    .check-btn {
      background: #58cc02;
      border: none;
      border-radius: 40px;
      padding: 18px 20px;
      font-size: 20px;
      font-weight: 700;
      color: white;
      text-transform: uppercase;
      letter-spacing: 1px;
      box-shadow: 0 6px 0 #3f9e00;
      width: 100%;
      border: 1px solid #7ed934;
      cursor: pointer;
      transition: all 0.08s;
      margin-top: 6px;
      font-family: inherit;
    }

    .check-btn:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #3f9e00;
    }

    .check-btn:disabled {
      background: #b8d9a0;
      box-shadow: 0 4px 0 #7fa363;
      transform: none;
      pointer-events: none;
      opacity: 0.7;
    }

    .continue-btn {
      background: #1f3b12;
      box-shadow: 0 6px 0 #0f1e08;
      border: 1px solid #3d6130;
      margin-top: 20px;
    }

    .continue-btn:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #0f1e08;
    }

    /* блок обратной связи */
    .feedback-message {
      min-height: 48px;
      margin: 12px 0 6px;
      padding: 10px 16px;
      background: #faf9e6;
      border-radius: 24px;
      font-size: 16px;
      font-weight: 500;
      color: #2b4f1e;
      display: flex;
      align-items: center;
      border-left: 6px solid #58cc02;
    }

    .feedback-message.error-feedback {
      border-left-color: #f0431e;
      background: #fff3ef;
      color: #a1300e;
    }

    /* нижняя панель */
    .bottom-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
    }

    .restart-btn {
      background: none;
      border: 2px solid #c2dbb2;
      padding: 12px 18px;
      border-radius: 40px;
      font-size: 16px;
      font-weight: 600;
      color: #3a5e2b;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: background 0.1s;
    }

    .restart-btn:active {
      background: #e2f0d8;
    }

    .small-note {
      font-size: 14px;
      color: #6f8f5e;
      font-weight: 500;
    }

    /* завершающий экран */
    .complete-screen {
      text-align: center;
      padding: 30px 10px;
    }

    .complete-emoji {
      font-size: 64px;
      margin-bottom: 12px;
    }

    .complete-title {
      font-size: 28px;
      font-weight: 700;
      color: #2b7334;
    }

    /* утилиты */
    .hidden {
      display: none !important;
    }

    .no-select {
      user-select: none;
    }
  </style>
</head>
<body>
<div class="phone-frame">
  <!-- Верхняя панель -->
  <div class="duo-header">
    <div class="duo-icon">
      <span>🦉</span>
      <h2>DuoFood</h2>
    </div>
    <div class="heart-score">
      <span>❤️</span> <span id="scoreDisplay">0</span>/<span id="totalQuestions">17</span>
    </div>
  </div>

  <!-- Прогресс -->
  <div class="progress-section">
    <div class="progress-info">
      <span id="progressText">Вопрос 1/17</span>
      <span>⚡</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
    </div>
  </div>

  <!-- Основной контейнер вопроса -->
  <div id="quizArea">
    <div class="question-card">
      <div class="english-phrase" id="englishPhrase">a cup of coffee</div>
      
      <!-- Динамический контент: input или выбор -->
      <div id="dynamicContent"></div>
      
      <!-- Кнопка "Проверить" (только для ввода) -->
      <button class="check-btn" id="checkBtn">Проверить</button>
      
      <!-- Сообщение об ошибке/правильности -->
      <div class="feedback-message" id="feedbackMsg">Введи перевод ✏️</div>
      
      <!-- Кнопка "Продолжить" (появляется после ответа) -->
      <button class="check-btn continue-btn hidden" id="continueBtn">ПРОДОЛЖИТЬ</button>
    </div>
  </div>

  <!-- Экран завершения -->
  <div id="completionScreen" class="complete-screen hidden">
    <div class="complete-emoji">🏆</div>
    <div class="complete-title">Урок пройден!</div>
    <p style="margin: 16px 0 20px; color: #3d6130;">Ты заработал <span id="finalScoreSpan">0</span> очков</p>
    <button class="check-btn" id="restartFromCompleteBtn" style="box-shadow: 0 5px 0 #3f9e00;">НАЧАТЬ ЗАНОВО</button>
  </div>

  <!-- Нижняя панель -->
  <div class="bottom-actions">
    <button class="restart-btn" id="restartBtn">
      <span>⟳</span> Заново
    </button>
    <span class="small-note" id="typeHint"></span>
  </div>
</div>

<script>
  (function(){
    "use strict";

    // ---------- СЛОВАРЬ (англ ➔ русский) ----------
    const PHRASES = [
      { en: "a cup of coffee", ru: "чашка кофе", type: "input" },
      { en: "a bag of flour", ru: "пакет муки", type: "input" },
      { en: "a tube of toothpaste", ru: "тюбик зубной пасты", type: "input" },
      { en: "a jar of jam", ru: "банка варенья", type: "input" },
      { en: "a bottle of lemonade", ru: "бутылка лимонада", type: "input" },
      { en: "a carton of milk", ru: "пакет молока", type: "input" },
      { en: "a packet of tea", ru: "пачка чая", type: "input" },
      { en: "a kilo of meat", ru: "килограмм мяса", type: "input" },
      // следующие — с выбором ответа (choice)
      { en: "a bar of chocolate", ru: "плитка шоколада", type: "choice" },
      { en: "a tin of mushrooms", ru: "банка грибов", type: "choice" },
      { en: "a piece of cheese", ru: "кусок сыра", type: "choice" },
      { en: "a loaf of bread", ru: "буханка хлеба", type: "choice" },
      { en: "a carton of yoghurt", ru: "упаковка йогурта", type: "choice" },
      { en: "a bowl of soup", ru: "тарелка супа", type: "choice" },
      { en: "a piece of paper", ru: "лист бумаги", type: "choice" },
      { en: "a glass of water", ru: "стакан воды", type: "choice" },
      { en: "a cup of coffee", ru: "чашка кофе", type: "choice" } // ещё одна чашка для разнообразия, но перевод тот же
    ];

    // Немного подправим последний элемент (чтобы не скучно), но оставим как есть.
    // Всего 17 фраз (индексы 0..16)

    const TOTAL = PHRASES.length;

    // Состояние
    let currentIndex = 0;
    let score = 0;
    let answered = false;        // был ли дан ответ на текущий вопрос
    let isCorrect = false;
    let currentOptions = [];      // для choice вопросов

    // DOM элементы
    const englishPhraseEl = document.getElementById('englishPhrase');
    const dynamicContent = document.getElementById('dynamicContent');
    const checkBtn = document.getElementById('checkBtn');
    const continueBtn = document.getElementById('continueBtn');
    const feedbackMsg = document.getElementById('feedbackMsg');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const totalQuestionsSpan = document.getElementById('totalQuestions');
    const typeHint = document.getElementById('typeHint');
    const quizArea = document.getElementById('quizArea');
    const completionScreen = document.getElementById('completionScreen');
    const finalScoreSpan = document.getElementById('finalScoreSpan');
    const restartBtn = document.getElementById('restartBtn');
    const restartFromCompleteBtn = document.getElementById('restartFromCompleteBtn');

    totalQuestionsSpan.textContent = TOTAL;

    // Вспомогательные функции
    function normalizeAnswer(str) {
      return str.trim().toLowerCase().replace(/\s+/g, ' ');
    }

    // Генерация вариантов для choice (правильный + 3 случайных из других фраз)
    function generateOptions(correctRu, excludeIndex) {
      const otherTranslations = PHRASES
        .filter((_, idx) => idx !== excludeIndex)
        .map(p => p.ru);
      
      // Убираем дубликаты в пуле
      const uniqueOthers = [...new Set(otherTranslations)];
      
      // перемешиваем и берём 3 уникальных
      let pool = uniqueOthers.filter(ru => ru !== correctRu);
      // если вдруг мало (но у нас много)
      while (pool.length < 3) {
        pool.push('пакет чая'); // fallback
      }
      
      const shuffled = [...pool].sort(() => Math.random() - 0.5);
      const selected = shuffled.slice(0, 3);
      
      let options = [correctRu, ...selected];
      // перемешать варианты
      for (let i = options.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [options[i], options[j]] = [options[j], options[i]];
      }
      return options;
    }

    // Отображение текущего вопроса
    function renderQuestion() {
      const phrase = PHRASES[currentIndex];
      englishPhraseEl.textContent = phrase.en;
      
      // Обновляем подсказку типа задания
      if (phrase.type === 'input') {
        typeHint.textContent = '✏️ Введи перевод';
      } else {
        typeHint.textContent = '👆 Выбери вариант';
      }
      
      // Сброс состояния ответа
      answered = false;
      isCorrect = false;
      
      // Прячем кнопку продолжить, показываем проверить (для input) / для choice скроем чек-кнопку
      continueBtn.classList.add('hidden');
      checkBtn.classList.remove('hidden');
      
      // Очищаем feedback (нейтральный)
      feedbackMsg.textContent = phrase.type === 'input' ? 'Введи перевод ✏️' : 'Выбери правильный перевод 👇';
      feedbackMsg.classList.remove('error-feedback');
      
      // Строим интерфейс в зависимости от типа
      if (phrase.type === 'input') {
        // поле ввода
        dynamicContent.innerHTML = `
          <div class="input-area">
            <input type="text" id="translationInput" class="translation-input" placeholder="введи по-русски..." autocomplete="off" autofocus>
          </div>
        `;
        const inputField = document.getElementById('translationInput');
        inputField.disabled = false;
        inputField.focus();
        
        // вешаем обработчик на Enter
        inputField.addEventListener('keypress', (e) => {
          if (e.key === 'Enter' && !answered) {
            e.preventDefault();
            handleCheck();
          }
        });
        
        checkBtn.disabled = false;
        checkBtn.onclick = handleCheck;
      } else {
        // choice: варианты
        const correctRu = phrase.ru;
        currentOptions = generateOptions(correctRu, currentIndex);
        
        let optionsHtml = `<div class="options-grid" id="optionsContainer">`;
        currentOptions.forEach(opt => {
          optionsHtml += `<button class="option-btn" data-value="${opt}">${opt}</button>`;
        });
        optionsHtml += `</div>`;
        dynamicContent.innerHTML = optionsHtml;
        
        // кнопку "Проверить" скрываем — в choice проверка мгновенная
        checkBtn.classList.add('hidden');
        
        const optionButtons = document.querySelectorAll('.option-btn');
        optionButtons.forEach(btn => {
          btn.addEventListener('click', (e) => {
            if (answered) return;
            const selected = btn.dataset.value;
            const isAnswerCorrect = (selected === correctRu);
            
            // Визуальная обратная связь
            optionButtons.forEach(b => {
              b.disabled = true;
              if (b.dataset.value === correctRu) {
                b.classList.add('correct-guess');
              }
            });
            
            if (!isAnswerCorrect) {
              btn.classList.add('wrong-guess');
            }
            
            // Обработка результата
            handleChoiceResult(isAnswerCorrect, correctRu);
          });
        });
      }
      
      // Обновление прогресса
      updateProgressAndScore();
    }

    function handleChoiceResult(isAnswerCorrect, correctAnswer) {
      answered = true;
      isCorrect = isAnswerCorrect;
      
      if (isAnswerCorrect) {
        score++;
        feedbackMsg.textContent = `✅ Отлично! «${correctAnswer}» — верно!`;
        feedbackMsg.classList.remove('error-feedback');
      } else {
        feedbackMsg.textContent = `❌ Неправильно. Правильно: «${correctAnswer}»`;
        feedbackMsg.classList.add('error-feedback');
      }
      
      // Деактивируем все кнопки вариантов
      document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
      
      // Обновляем счёт
      updateProgressAndScore();
      
      // Показываем кнопку "Продолжить"
      continueBtn.classList.remove('hidden');
      checkBtn.classList.add('hidden');
    }

    // Обработчик для input (кнопка Проверить)
    function handleCheck() {
      if (answered) return;
      
      const phrase = PHRASES[currentIndex];
      const inputField = document.getElementById('translationInput');
      if (!inputField) return;
      
      const userAnswer = normalizeAnswer(inputField.value);
      const correctAnswer = phrase.ru;
      const normalizedCorrect = normalizeAnswer(correctAnswer);
      
      // Простое сравнение (можно улучшить)
      const isAnswerCorrect = (userAnswer === normalizedCorrect);
      
      answered = true;
      isCorrect = isAnswerCorrect;
      inputField.disabled = true;
      checkBtn.disabled = true;
      
      if (isAnswerCorrect) {
        score++;
        feedbackMsg.textContent = `✅ Правильно! «${correctAnswer}»`;
        feedbackMsg.classList.remove('error-feedback');
      } else {
        feedbackMsg.textContent = `❌ Ошибка. Верный перевод: «${correctAnswer}»`;
        feedbackMsg.classList.add('error-feedback');
      }
      
      updateProgressAndScore();
      
      // показать continue
      continueBtn.classList.remove('hidden');
    }

    function updateProgressAndScore() {
      scoreDisplay.textContent = score;
      const progressPercent = ((currentIndex + 1) / TOTAL) * 100;
      progressFill.style.width = progressPercent + '%';
      progressText.textContent = `Вопрос ${currentIndex + 1}/${TOTAL}`;
    }

    // Переход к следующему вопросу или завершение
    function goToNextQuestion() {
      if (currentIndex < TOTAL - 1) {
        currentIndex++;
        renderQuestion();
      } else {
        // Урок завершён
        finishQuiz();
      }
    }

    function finishQuiz() {
      quizArea.classList.add('hidden');
      completionScreen.classList.remove('hidden');
      finalScoreSpan.textContent = score;
      // обновим общий счёт на всякий
      scoreDisplay.textContent = score;
    }

    // Сброс всего прогресса
    function restartQuiz() {
      currentIndex = 0;
      score = 0;
      answered = false;
      
      quizArea.classList.remove('hidden');
      completionScreen.classList.add('hidden');
      
      renderQuestion();
      updateProgressAndScore();
      feedbackMsg.classList.remove('error-feedback');
    }

    // Обработчик continue
    function handleContinue() {
      if (!answered) return; // на всякий случай
      goToNextQuestion();
    }

    // Привязка событий
    continueBtn.addEventListener('click', handleContinue);
    
    restartBtn.addEventListener('click', () => {
      restartQuiz();
    });
    
    restartFromCompleteBtn.addEventListener('click', () => {
      restartQuiz();
    });

    // Инициализация
    function init() {
      renderQuestion();
      updateProgressAndScore();
    }

    init();

    // Дополнительно: обработка свайпов/жестов не т
